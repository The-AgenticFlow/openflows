[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = ["RUSTSEC-2024-0436"]  # paste is unmaintained but not unsound; no replacement needed

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unicode-3.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
