name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths-ignore:
      - 'packaging/homebrew/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      prerelease_flag: ${{ steps.version.outputs.prerelease_flag }}
      npm_version: ${{ steps.version.outputs.npm_version }}
      npm_tag: ${{ steps.version.outputs.npm_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            if [[ "${VERSION}" =~ (rc|beta|alpha) ]]; then IS_PRERELEASE="true"; else IS_PRERELEASE="false"; fi
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            if [[ "${VERSION}" =~ (rc|beta|alpha) ]]; then IS_PRERELEASE="true"; else IS_PRERELEASE="false"; fi
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            LAST_STABLE_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | grep -v -- '-dev\.' | head -1 || echo "")
            if [ -z "$LAST_STABLE_TAG" ]; then LAST_STABLE_TAG="v0.0.0"; fi
            LAST_VERSION="${LAST_STABLE_TAG#v}"
            COMMIT_COUNT=$(git rev-list --count "${LAST_STABLE_TAG}..HEAD" 2>/dev/null || echo "0")
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="v${LAST_VERSION}-dev.${COMMIT_COUNT}.${SHORT_SHA}"
            IS_PRERELEASE="true"
          else
            echo "::error::Unexpected ref: ${GITHUB_REF}"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            echo "prerelease_flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease_flag=" >> "$GITHUB_OUTPUT"
          fi

          NPM_VERSION="${VERSION#v}"
          NPM_TAG="latest"
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            NPM_TAG="next"
          fi
          echo "npm_version=${NPM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "npm_tag=${NPM_TAG}" >> "$GITHUB_OUTPUT"

          echo "Resolved version: ${VERSION}"
          echo "Is prerelease: ${IS_PRERELEASE}"
          echo "npm version: ${NPM_VERSION}"
          echo "npm dist-tag: ${NPM_TAG}"

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.17
            archive_ext: tar.gz
            use_zigbuild: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            use_zigbuild: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.17
            archive_ext: tar.gz
            use_zigbuild: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            use_zigbuild: false
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            use_zigbuild: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools libssl-dev pkg-config
          if [[ "${{ matrix.target }}" == "aarch64"* ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Install zig and cargo-zigbuild
        if: matrix.use_zigbuild
        run: |
          pip3 install ziglang cargo-zigbuild

      - name: Build binaries
        run: >
          ${{ matrix.use_zigbuild && 'cargo zigbuild' || 'cargo build' }} --release
          --target ${{ matrix.use_zigbuild && matrix.zigbuild_target || matrix.target }}
          --bin openflows
          --bin openflows-setup
          --bin openflows-dashboard
          --bin openflows-doctor
          --bin anthropic-proxy

      - name: Create tarball
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          PLATFORM="${{ matrix.target }}"
          BUILD_TARGET="${{ matrix.use_zigbuild && matrix.zigbuild_target || matrix.target }}"
          ARCHIVE="openflows-${VERSION}-${PLATFORM}"
          mkdir -p "dist/${ARCHIVE}"

          for bin in openflows openflows-setup openflows-dashboard openflows-doctor anthropic-proxy; do
            cp "target/${BUILD_TARGET}/release/${bin}" "dist/${ARCHIVE}/"
          done

          cp -r orchestration "dist/${ARCHIVE}/"
          cp README.md LICENSE "dist/${ARCHIVE}/" 2>/dev/null || true

          tar -czf "dist/${ARCHIVE}.tar.gz" -C dist "${ARCHIVE}"
          echo "ARCHIVE_NAME=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"

      - name: Generate checksum
        run: |
          cd dist
          sha256sum "${{ env.ARCHIVE_NAME }}" > "${{ env.ARCHIVE_NAME }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/*
          retention-days: 5

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build, resolve-version]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and tags
        id: version
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          VERSION="${VERSION#v}"
          VERSION=$(echo "$VERSION" | sed 's|/|-|g')
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ "${{ needs.resolve-version.outputs.is_prerelease }}" == "true" ]]; then
            echo "CHANNEL_TAG=edge" >> "$GITHUB_OUTPUT"
          else
            echo "CHANNEL_TAG=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/the-agenticflow/openflows:${{ steps.version.outputs.CHANNEL_TAG }}
            ghcr.io/the-agenticflow/openflows:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, docker, resolve-version]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: binaries-*
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          IS_PRERELEASE="${{ needs.resolve-version.outputs.is_prerelease }}"

          PREV_TAG=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || echo "")

          echo "## What's Changed" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            echo "### Continuous build from main" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "This is an automated pre-release build from the \`main\` branch." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "**Note:** This build may contain unstable changes. For production use, install the latest stable release." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          if [ -n "$PREV_TAG" ]; then
            echo "### Changes since $PREV_TAG" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${VERSION}" >> CHANGELOG.md
          else
            echo "### Initial Release" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" >> CHANGELOG.md
          fi

          echo "" >> CHANGELOG.md
          echo "## Installation" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo '```bash' >> CHANGELOG.md
          echo 'curl -fsSL https://raw.githubusercontent.com/The-AgenticFlow/openflows/main/scripts/install.sh | bash' >> CHANGELOG.md
          echo '```' >> CHANGELOG.md

          cat CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.version }}
          name: "OpenFlows ${{ needs.resolve-version.outputs.version }}"
          body_path: CHANGELOG.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
          draft: false
          prerelease: ${{ needs.resolve-version.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build, resolve-version]
    if: needs.resolve-version.outputs.is_prerelease == 'false' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: binaries-*
          merge-multiple: true

      - name: Update package version
        working-directory: packaging/npm
        run: |
          npm version ${{ needs.resolve-version.outputs.npm_version }} --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: packaging/npm
        run: |
          npm publish --access public --tag ${{ needs.resolve-version.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build, resolve-version]
    if: needs.resolve-version.outputs.is_prerelease == 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Publish crates
        run: |
          cargo publish -p pocketflow-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          cargo publish -p config --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          cargo publish -p agent-client --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          cargo publish -p github --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          cargo publish -p agent-nexus --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          cargo publish -p agent-forge --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          cargo publish -p agent-sentinel --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          cargo publish -p agent-vessel --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          cargo publish -p agent-lore --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          cargo publish -p pair-harness --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          cargo publish -p agentflow-tui --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          cargo publish -p openflows --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: [build, resolve-version]
    if: needs.resolve-version.outputs.is_prerelease == 'false'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update Homebrew formula
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          VERSION="${VERSION#v}"
          SHA=$(git rev-parse HEAD)

          sed -i "s/tag:.*/tag:      \"v${VERSION}\",/" packaging/homebrew/openflows.rb
          sed -i "s/revision:.*/revision: \"${SHA}\"/" packaging/homebrew/openflows.rb

      - name: Commit and push Homebrew formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/homebrew/openflows.rb
          git commit -m "chore: update Homebrew formula for ${{ needs.resolve-version.outputs.version }} [skip ci]" || { echo "No changes"; exit 0; }
          git push origin HEAD:main
